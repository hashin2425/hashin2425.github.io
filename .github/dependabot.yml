version: 2
updates:
  # Fetch and update latest `npm` packages
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      time: "00:00"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - hashin2425
    assignees:
      - hashin2425
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  # Fetch and update latest `github-actions` pkgs
    cooldown:
      default-days: 7
      semver-major-days: 30
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "00:00"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - hashin2425
    assignees:
      - hashin2425
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    cooldown:
      default-days: 7
